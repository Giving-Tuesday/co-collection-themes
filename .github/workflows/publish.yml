name: Publish to GitHub Packages

on:
  push:
    tags:
      - "v*"
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version type to publish (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - prepatch
          - preminor
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: "@giving-tuesday"

      - name: Install and build
        run: |
          npm ci
          npm run build
        env:
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Publish (Tag Push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == *"beta"* ]] || [[ "$TAG_NAME" == *"alpha"* ]] || [[ "$TAG_NAME" == *"rc"* ]]; then
            echo "Publishing prerelease: $TAG_NAME"
            npm publish --tag beta
          else
            echo "Publishing stable release: $TAG_NAME"
            npm publish
          fi
        env:
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Version and Publish (Manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          PRERELEASE="${{ inputs.prerelease || 'false' }}"
          VERSION="${{ inputs.version }}"
          if [[ "$PRERELEASE" == "true" ]]; then
            npm version $VERSION --preid beta
            npm publish --tag beta
          else
            npm version $VERSION
            npm publish
          fi
          git push --follow-tags
        env:
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish (Release Trigger)
        if: github.event_name == 'release'
        run: |
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
        env:
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}